<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stem Visualizer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    @font-face {
      font-family: 'Doto';
      src: url('fonts/Doto_Rounded-ExtraBold.ttf') format('truetype');
      font-weight: 800;
    }
    @font-face {
      font-family: 'Doto';
      src: url('fonts/Doto_Rounded-SemiBold.ttf') format('truetype');
      font-weight: 600;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3a;
      --accent: #7b6cf6;
      --accent2: #f06caa;
      --text: #e0e0f0;
      --muted: #666688;
    }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
    }
    body {
      background: #eae8e5;
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ── VISUALIZER ── */
    #visualizer {
      display: flex;
      flex: 1;
      flex-direction: column;
      position: relative;
    }
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── CANVAS TEXT OVERLAYS ── */
    #txt-title, #txt-quote {
      position: absolute;
      pointer-events: none;
      color: #1a1a1a;
      mix-blend-mode: multiply;
      font-family: 'Doto', monospace;
      line-height: 1.25;
      letter-spacing: 0.04em;
      z-index: 10;
    }
    #txt-title {
      font-weight: 800;
      font-size: 24px;
      top: 50%;
      left: 6%;
    }
    #txt-quote {
      font-weight: 600;
      font-size: 14px;
      text-align: right;
      bottom: 35%;
      right: 25%;
      width: 22%;
    }

    /* ── TRANSPORT ── */
    #transport {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 56px;
      padding: 6px 16px 10px;
      background: #222222;
      border-top: 1px solid #333;
      flex-shrink: 0;
    }
    #transport button {
      background: none;
      border: none;
      outline: none;
      color: #eae8e5;
      padding: 0 12px 0 0;
      font-family: 'Doto', monospace;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #transport button:focus { outline: none; }
    #transport button:active { background: none; }
    @keyframes blink { 50% { opacity: 0.5; } }

    #stem-meters {
      display: flex;
      gap: 8px;
      flex: 1;
      overflow-x: auto;
      padding: 2px 0;
      min-width: 0;
    }
    .meter-cell {
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-width: 36px;
    }
    .meter-cell .label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      max-width: 36px;
      overflow: hidden;
    }
    .meter-bar-wrap {
      width: 7px; height: 20px;
      background: #222222;
      border-radius: 4px; overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .meter-bar-fill { width: 100%; border-radius: 4px; }


    /* ── PLAY BUTTON OVERLAY (mobile only, shown via media query) ── */
    .play-btn-overlay {
      display: none;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Doto', monospace;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.1em;
      cursor: pointer;
      z-index: 3;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
    }
    #play-btn-dark  { color: #222222; bottom: calc(10% + 36px); }
    #play-btn-white { color: #eae8e5; bottom: calc(10% + 36px); }

    /* ── SCROLL HINTS ── */
    #scroll-down, #scroll-up-white {
      position: absolute;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Doto', monospace;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.1em;
      pointer-events: none;
    }
    /* dark "SCROLL DOWN" at top — lives above curtain, hidden once covered */
    #scroll-down { top: 28px; color: #1a1a1a; z-index: 3; }
    /* white "SCROLL UP" at bottom — only visible inside clip (curtain region) */
    #scroll-up-white { bottom: 14px; color: #ffffff; }

    /* ── AMBIENCE CURTAIN ── */
    #canvas-wrap { background: #eae8e5; }
    #ambience-curtain {
      position: absolute;
      inset: 0;
      background: #222222;
      transform: translateY(-100%);
      pointer-events: none;
      z-index: 1;
    }
    #canvas-wrap canvas { position: relative; z-index: 2; }
    #txt-title, #txt-quote { z-index: 3; }

    /* White text layer — clipped to curtain region via clip-path */
    #txt-clip {
      position: absolute;
      inset: 0;
      clip-path: inset(0 0 100% 0); /* JS updates bottom value */
      z-index: 4;
      pointer-events: none;
    }
    #txt-title-white, #txt-quote-white {
      position: absolute;
      color: #ffffff;
      font-family: 'Doto', monospace;
      line-height: 1.25;
      letter-spacing: 0.04em;
    }
    #txt-title-white {
      font-weight: 800;
      font-size: 24px;
      top: 50%;
      left: 6%;
    }
    #txt-quote-white {
      font-weight: 600;
      font-size: 14px;
      text-align: right;
      bottom: 35%;
      right: 25%;
      width: 22%;
    }


    /* ── MOBILE ── */
    @media (max-width: 768px) {
      #visualizer { min-height: 0; }
      .play-btn-overlay { display: block; }
      #transport button { display: none !important; }

      /* Text: smaller, repositioned for portrait */
      #txt-title, #txt-title-white {
        font-size: 13px;
        top: 42%;
        left: 14px;
      }
      #txt-quote, #txt-quote-white {
        font-size: 12px;
        bottom: 30%;
        right: 16px;
        left: auto;
        width: 55%;
      }

      #scroll-down { top: 50px; }

      /* Transport: tall, play button floats above */
      #transport {
        height: 88px;
        padding: 8px 10px;
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        gap: 0;
        justify-content: center;
        flex-wrap: nowrap;
        flex-shrink: 0;
        position: relative;
        overflow: visible;
      }
      #transport button {
        -webkit-appearance: none;
        appearance: none;
        padding: 0;
        margin: 0;
        width: auto;
        height: auto;
        font-size: 28px;
        border-radius: 0;
        background: transparent !important;
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
        color: #222222;
        position: absolute;
        left: 50%;
        bottom: calc(100% + 48px);
        transform: translateX(-50%);
        z-index: 10;
        line-height: 1;
      }
      #stem-meters { width: 100%; min-width: 0; overflow-x: hidden; align-items: center; justify-content: center; gap: 12px; }
      .meter-cell { min-width: 24px; justify-content: center; }
      .meter-cell .label { font-size: 7px; }
      .meter-bar-wrap { width: 5px; height: 20px; }
    }
  </style>
</head>
<body>

<!-- ══════════════ VISUALIZER ══════════════ -->
<div id="visualizer">
  <div id="canvas-wrap">
    <div id="ambience-curtain"></div>
    <div id="txt-title">EARTHLING</div>
    <div id="txt-quote">YOU CAN'T<br>REALLY CONTROL<br>ANYTHING</div>
    <div id="scroll-down">SCROLL DOWN</div>
    <div id="play-btn-dark" class="play-btn-overlay">PLAY</div>
    <!-- White copies clipped to the curtain region -->
    <div id="txt-clip">
      <div id="txt-title-white">EARTHLING</div>
      <div id="txt-quote-white">YOU CAN'T<br>REALLY CONTROL<br>ANYTHING</div>
      <div id="scroll-up-white">SCROLL UP</div>
      <div id="play-btn-white" class="play-btn-overlay">PLAY</div>
    </div>
  </div>
  <div id="transport">
    <button id="play-pause">PLAY</button>
    <div id="stem-meters"></div>
  </div>
</div>


<script>
// ─────────────────────────────────────────────
//  STEM TYPES
// ─────────────────────────────────────────────
const STEM_TYPES = ['kick','snare','hi-hat','bass','synth','perc','vox','other'];

// ─────────────────────────────────────────────
//  HEAD POSE + COLOR SYSTEM
// ─────────────────────────────────────────────
const EMIT_THRESHOLD = 0.018;

// Bubblegum Bliss palette — one color per non-kick stem
const STEM_COLORS_3D = {
  snare:   0xFFA5D6,  // hot pink
  'hi-hat':0xFFD6EE,  // soft pink
  bass:    0xA7ABDE,  // periwinkle
  synth:   0xCED1F8,  // lavender blue
  perc:    0xECD2E0,  // dusty rose
  vox:     0xFFF0F1,  // near white blush
  other:   0xFFD6EE,  // soft pink fallback
  kick:    0x80E080,  // green
};

// Each stem type drives the head to a distinct pose.
// rotX/Y/Z in radians, posY vertical offset.
const STEM_POSES = {
  // kick has no pose — vibration only
  snare:   { rotX: -0.25, rotY:  1.20, rotZ:  0.20 }, // hard right, chin up
  'hi-hat':{ rotX:  0.60, rotY: -0.85, rotZ: -0.18 }, // down-left, chin dropped
  bass:    { rotX:  0.45, rotY:  0.55, rotZ:  0.35 }, // forward-right, heavy
  synth:   { rotX: -0.65, rotY: -1.10, rotZ:  0.08 }, // up-left, dramatic lean
  perc:    { rotX:  0.20, rotY:  1.40, rotZ: -0.30 }, // hard right snap, tilt
  vox:     { rotX: -0.50, rotY:  0.30, rotZ:  0.40 }, // back, rolled, tilted
  other:   { rotX:  0.30, rotY: -1.20, rotZ: -0.15 }, // hard left, chin slightly down
  kick:    { rotX:  0.00, rotY:  0.00, rotZ:  0.00 }, // unused — vibration only
};

// ─────────────────────────────────────────────
//  METER COLORS (transport bar)
// ─────────────────────────────────────────────
const STEM_COLORS = {
  kick:    '#8855ee',
  snare:   '#f040a0',
  'hi-hat':'#e8a030',
  bass:    '#30d4a0',
  synth:   '#4090f0',
  perc:    '#f05518',
  vox:     '#f03060',
  other:   '#60e040',
};

// ─────────────────────────────────────────────
//  LIVE CONFIG
// ─────────────────────────────────────────────
const CFG = {
  // user controls
  vibration:  0.81,  // 0–1 → kick shake strength multiplier
  stiffness:  0.95,  // 0–1 → 0=jelly/floppy, 1=rigid (maps pose spring + mesh stiffness)
  hue:        143,   // 0–360 → hue rotation applied to all colors
  intensity:  0.66,  // 0–1 → master volume + overall animation scale

  // internal derived (recomputed from user controls each frame)
  sensitivity: 1.0,
  lerp:        0.15,
  poseStiff:   0.10,
  damping:     0.72,
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let stems         = [];
let audioCtx      = null;
let threeInstance = null;
let playing       = false;
let startOffset   = 0;
let startTime     = 0;
let recDestNode   = null;

// ─────────────────────────────────────────────
//  AMBIENCE CURTAIN
// ─────────────────────────────────────────────
(function() {
  let ambienceVal = 0;
  const curtain = document.getElementById('ambience-curtain');
  const clip    = document.getElementById('txt-clip');

  const QUOTES = [
    'YOU CAN\'T<br>REALLY CONTROL<br>ANYTHING',
    'DON\'T BE DARK<br>ABOUT IT',
    'GO TO THE<br>MOUNTAINS',
    'CALL YOUR MOM',
    'WEAR THEM<br>TROUSERS',
    'BEND METALS',
    'GET PAID',
    'EAT A PIZZA',
    'PET A CAT',
  ];

  // Shuffle all except first, keep index 0 first
  const shuffled = [QUOTES[0], ...QUOTES.slice(1).sort(() => Math.random() - 0.5)];
  let quoteIdx = 0;

  const quoteEl      = document.getElementById('txt-quote');
  const quoteWhiteEl = document.getElementById('txt-quote-white');

  function setQuote(html) {
    quoteEl.innerHTML = html;
    quoteWhiteEl.innerHTML = html;
  }

  setQuote(shuffled[0]);

  let prevV         = 0;
  let curtainOver   = false; // curtain is covering the quote text right now

  function isCurtainOverQuote(v) {
    const wrapRect  = document.getElementById('canvas-wrap').getBoundingClientRect();
    const quoteRect = quoteEl.getBoundingClientRect();
    const quoteTopFrac = (quoteRect.top - wrapRect.top) / wrapRect.height;
    return v > quoteTopFrac; // curtain bottom edge is below quote top
  }

  const scrollDown = document.getElementById('scroll-down');

  function isCurtainOverEl(el, v) {
    const wrapRect = document.getElementById('canvas-wrap').getBoundingClientRect();
    const elRect   = el.getBoundingClientRect();
    return v > (elRect.top - wrapRect.top) / wrapRect.height;
  }

  function update() {
    const v = ambienceVal;

    curtain.style.transform = `translateY(${(v - 1) * 100}%)`;
    clip.style.clipPath = `inset(0 0 ${(1 - v) * 100}% 0)`;

    if (threeInstance) {
      const r = Math.round(0xea + (0x22 - 0xea) * v);
      const g = Math.round(0xe8 + (0x22 - 0xe8) * v);
      const b = Math.round(0xe5 + (0x22 - 0xe5) * v);
      threeInstance.setFogColor((r << 16) | (g << 8) | b);
    }

    // Quote swap
    const nowOver = isCurtainOverQuote(v);
    if (nowOver !== curtainOver) {
      quoteIdx = (quoteIdx + 1) % shuffled.length;
      setQuote(shuffled[quoteIdx]);
    }
    curtainOver = nowOver;

    // Hide "SCROLL DOWN" once curtain covers it
    scrollDown.style.opacity = isCurtainOverEl(scrollDown, v) ? '0' : '1';

    prevV = v;
  }

  // Scroll wheel controls the curtain + triggers play
  document.addEventListener('wheel', e => {
    e.preventDefault();
    if (window._tryResumeAudio) window._tryResumeAudio();
    ambienceVal = Math.min(1, Math.max(0, ambienceVal + e.deltaY / 1200));
    update();
  }, { passive: false });

  // Touch swipe controls the curtain + triggers play
  let touchStartY = null;
  document.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (touchStartY === null) return;
    const dy = touchStartY - e.touches[0].clientY;
    touchStartY = e.touches[0].clientY;
    if (window._tryResumeAudio) window._tryResumeAudio();
    ambienceVal = Math.min(1, Math.max(0, ambienceVal + dy / 400));
    update();
  }, { passive: true });


  update();
})();


// ─────────────────────────────────────────────
//  AUTO-LAUNCH (hardcoded stems)
// ─────────────────────────────────────────────
const HARDCODED_STEMS = [
  'earthling bass.wav',
  'earthling hihat.wav',
  'earthling kick.wav',
  'earthling pan gem.wav',
  'earthling piano.wav',
  'earthling vox.wav',
];

// ─────────────────────────────────────────────
//  BOOT — fetch stems, decode, start on first click
// ─────────────────────────────────────────────
function guessType(name) {
  name = name.toLowerCase();
  if (/kick|bd|bass.?drum/.test(name))     return 'kick';
  if (/snare|sd/.test(name))               return 'snare';
  if (/hihat|hi.hat|hh|cymbal/.test(name)) return 'hi-hat';
  if (/bass|sub/.test(name))               return 'bass';
  if (/synth|lead|keys|pad|piano|gem/.test(name)) return 'synth';
  if (/perc|clave|shaker|tamb/.test(name)) return 'perc';
  if (/vox|vocal|voice/.test(name))        return 'vox';
  return 'other';
}

async function boot() {
  // Start Three.js immediately — visual runs before audio loads
  startThree();

  // Fetch all stem buffers in parallel
  let rawBuffers;
  try {
    rawBuffers = await Promise.all(HARDCODED_STEMS.map(async name => {
      const res = await fetch('stems/' + name);
      if (!res.ok) throw new Error(`${name}: ${res.status}`);
      return { name, type: guessType(name), buf: await res.arrayBuffer() };
    }));
  } catch(e) {
    console.error('Stem load failed:', e);
    return;
  }

  // Decode and start — AudioContext created immediately, browser resumes on first interaction automatically
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  stems = await Promise.all(rawBuffers.map(async d => {
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.3;
    const buffer = await audioCtx.decodeAudioData(d.buf.slice(0));
    return { type: d.type, name: d.name, analyser, buffer,
             source: null, lerpAmp: 0, prev: 0, lastFired: 0 };
  }));

  buildMeterUI();

  if (audioCtx.state === 'suspended') {
    // Browser blocked autoplay — start on first deliberate interaction
    window._tryResumeAudio = async () => {
      if (audioCtx.state !== 'suspended') return;
      await audioCtx.resume();
      playAll();
    };
    document.addEventListener('click', window._tryResumeAudio);
    document.addEventListener('keydown', window._tryResumeAudio);
    document.addEventListener('touchend', window._tryResumeAudio);
  } else {
    playAll();
  }
}

function buildStemsFromPending() {} // no-op, kept for safety

// ─────────────────────────────────────────────
//  TRANSPORT
// ─────────────────────────────────────────────
function playAll() {
  if (playing) return;
  playing   = true;
  startTime = audioCtx.currentTime;
  stems.forEach(s => {
    const src = audioCtx.createBufferSource();
    src.buffer = s.buffer;
    src.loop   = true;
    src.connect(s.analyser);
    s.analyser.connect(audioCtx.destination);
    src.start(0, startOffset % s.buffer.duration);
    s.source = src;
  });
  setPlaySymbol('PAUSE');
}

function pauseAll() {
  if (!playing) return;
  playing      = false;
  startOffset += audioCtx.currentTime - startTime;
  stems.forEach(s => {
    if (s.source) {
      try { s.source.stop(); } catch(e) {}
      try { s.analyser.disconnect(); } catch(e) {}
      s.source = null;
    }
  });
  setPlaySymbol('PLAY');
}

function setPlaySymbol(sym) {
  document.getElementById('play-pause').textContent = sym;
  const d = document.getElementById('play-btn-dark');
  const w = document.getElementById('play-btn-white');
  if (d) d.textContent = sym;
  if (w) w.textContent = sym;
}

function togglePlay() {
  if (window._tryResumeAudio) window._tryResumeAudio();
  if (playing) pauseAll(); else playAll();
}

document.getElementById('play-pause').addEventListener('click', togglePlay);
document.getElementById('play-btn-dark').addEventListener('click', togglePlay);
document.getElementById('play-btn-white').addEventListener('click', togglePlay);

// ─────────────────────────────────────────────
//  METERS
// ─────────────────────────────────────────────
// STEM_COLORS values are CSS strings — parse them to numeric hex for hue shifting
function cssToHex(css) {
  // handles '#rrggbb' and '#rgb'
  css = css.replace('#', '');
  if (css.length === 3) css = css.split('').map(c => c+c).join('');
  return parseInt(css, 16);
}

function updateMeterColors() {
  stems.forEach(s => {
    if (s.meterEl && s.meterBaseHex != null) {
      s.meterEl.style.background = hexToCss(shiftHex(s.meterBaseHex, CFG.hue));
    }
  });
  // Update dark text color from hue
  const textCss = hexToCss(shiftHex(0x1a1a1a, CFG.hue));
  const t1 = document.getElementById('txt-title');
  const t2 = document.getElementById('txt-quote');
  if (t1) t1.style.color = textCss;
  if (t2) t2.style.color = textCss;
}

function buildMeterUI() {
  const metersEl = document.getElementById('stem-meters');
  metersEl.innerHTML = '';
  stems.forEach((s, i) => {
    const baseHex = cssToHex(STEM_COLORS[s.type] || '#aaaaaa');
    s.meterBaseHex = baseHex;
    const col  = hexToCss(shiftHex(baseHex, CFG.hue));
    const cell = document.createElement('div');
    cell.className = 'meter-cell';
    cell.innerHTML = `
      <div class="label">${s.type}</div>
      <div class="meter-bar-wrap">
        <div class="meter-bar-fill" style="background:${col};height:0%" id="meter-${i}"></div>
      </div>`;
    metersEl.appendChild(cell);
    s.meterEl = cell.querySelector(`#meter-${i}`);
  });
}

function stopRecording() {} // no-op — recording removed

// ─────────────────────────────────────────────
//  AUDIO HELPER
// ─────────────────────────────────────────────
function getRMS(analyser) {
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) {
    const v = (data[i] - 128) / 128;
    sum += v * v;
  }
  return Math.sqrt(sum / data.length);
}

// ─────────────────────────────────────────────
//  COLOR HELPERS (module scope — used by 3D mats + meter bars)
// ─────────────────────────────────────────────
function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
  };
  return (Math.round(f(0)*255) << 16) | (Math.round(f(8)*255) << 8) | Math.round(f(4)*255);
}
function hexToHsl(hex) {
  const r = ((hex >> 16) & 0xff) / 255;
  const g = ((hex >>  8) & 0xff) / 255;
  const b =  (hex        & 0xff) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const l = (max + min) / 2;
  if (max === min) return [0, 0, l * 100];
  const d = max - min;
  const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
  let h;
  if      (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
  else if (max === g) h = ((b - r) / d + 2) / 6;
  else                h = ((r - g) / d + 4) / 6;
  return [h * 360, s * 100, l * 100];
}
function shiftHex(hex, dHue) {
  const [h, s, l] = hexToHsl(hex);
  return hslToHex(h + dHue, s, l);
}
// Convert numeric hex to CSS #rrggbb string
function hexToCss(hex) {
  return '#' + ('000000' + hex.toString(16)).slice(-6);
}

// ─────────────────────────────────────────────
//  THREE.JS HEAD VISUALIZER
// ─────────────────────────────────────────────
function startThree() {
  if (threeInstance) { threeInstance.dispose(); threeInstance = null; }
  threeInstance = buildThreeScene();
}

function buildThreeScene() {
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  // ── Renderer ──
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H, false);
  renderer.setClearColor(0x000000, 0);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
  wrap.appendChild(renderer.domElement);

  // ── Scene + Camera ──
  const scene  = new THREE.Scene();
  scene.background = null;
  scene.fog    = new THREE.FogExp2(0xeae8e5, 0.12);
  const camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 100);
  camera.position.set(0, 0, 4.2);

  // ── Lights ──
  const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambLight);

  // Soft key from upper-right
  const keyLight = new THREE.DirectionalLight(0xfff8f0, 0.8);
  keyLight.position.set(3, 5, 2);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(2048, 2048);
  keyLight.shadow.camera.near   = 0.5;
  keyLight.shadow.camera.far    = 20;
  keyLight.shadow.camera.left   = -3;
  keyLight.shadow.camera.right  =  3;
  keyLight.shadow.camera.top    =  3;
  keyLight.shadow.camera.bottom = -3;
  keyLight.shadow.radius = 4;
  keyLight.shadow.bias   = -0.001;
  scene.add(keyLight);

  // Soft fill from left
  const contraKey = new THREE.DirectionalLight(0xddeeff, 0.3);
  contraKey.position.set(-4, 3, 1);
  scene.add(contraKey);

  // Rim from behind
  const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
  rimLight.position.set(0, 1, -4);
  scene.add(rimLight);

  // Gentle warm uplight
  const upLight = new THREE.SpotLight(0xffe8bb, 0.4);
  upLight.position.set(0, -5, 1.5);
  upLight.target.position.set(0, 0, 0);
  upLight.angle    = Math.PI / 5;
  upLight.penumbra = 0.9;
  upLight.decay    = 1.0;
  upLight.distance = 12;
  scene.add(upLight);
  scene.add(upLight.target);

  // ── Head hierarchy ──
  // pivot: centered on screen, rotated by spring
  // model (child): offset so its base sits at pivot origin
  const pivot = new THREE.Group();
  pivot.position.set(0, 0, 0);  // dead center of screen
  scene.add(pivot);
  const head = pivot;  // spring code targets pivot via 'head' reference

  const loader = new THREE.GLTFLoader();

  // All mesh references collected after load — used for material swapping + deform
  const meshes = [];

  // ── Simple hash noise (no dependencies) ──
  function hashNoise(x, y, z) {
    let n = Math.sin(x * 127.1 + y * 311.7 + z * 74.7) * 43758.5453;
    return n - Math.floor(n); // 0..1
  }
  function smoothNoise(x, y, z, t) {
    // animate noise by offsetting with time
    return (hashNoise(x + t * 0.3, y + t * 0.2, z + t * 0.4) - 0.5) * 2; // -1..1
  }

  function makeMat(hex) {
    return new THREE.MeshBasicMaterial({
      color: shiftHex(hex, CFG.hue),
      side:  THREE.DoubleSide,
    });
  }

  const BASE_HEX = 0xf0ece6;
  let baseMat = makeMat(BASE_HEX);
  let lastHue = CFG.hue;

  loader.load('white_mesh.glb', (gltf) => {
    const model = gltf.scene;

    model.traverse(child => {
      if (child.isMesh) {
        child.material      = baseMat;
        child.castShadow    = true;
        child.receiveShadow = true;
        child.geometry.computeVertexNormals();
        // Store original vertex positions + unique random seed per vertex
        const pos = child.geometry.attributes.position;
        child.userData.origPositions = new Float32Array(pos.array);
        child.userData.vertexSeeds   = Float32Array.from(
          { length: pos.count }, () => Math.random() * 100
        );
        meshes.push(child);
      }
    });

    // Scale
    const boxRaw = new THREE.Box3().setFromObject(model);
    const sizeRaw = new THREE.Vector3();
    boxRaw.getSize(sizeRaw);
    const maxDim = Math.max(sizeRaw.x, sizeRaw.y, sizeRaw.z);
    model.scale.setScalar(1.4 / maxDim);

    // Measure after scale
    const box = new THREE.Box3().setFromObject(model);
    const size = new THREE.Vector3();
    box.getSize(size);
    const center = new THREE.Vector3();
    box.getCenter(center);

    // Child offset: X/Z centered, Y so base of model sits at pivot origin
    // The pivot (parent) is at screen center — model hangs upward from there
    const baseY = box.min.y;
    model.position.set(-center.x, -baseY, -center.z);

    // Shift pivot down by half the model height so model is visually centered
    pivot.position.y = -(size.y * 0.5);

    head.add(model);
  });

  // ── Pose spring state ──
  const current = { rotX: 0, rotY: 0, rotZ: 0 };
  const vel     = { rotX: 0, rotY: 0, rotZ: 0 };
  let   target  = { rotX: 0, rotY: 0, rotZ: 0 };

  // ── Kick shake state ──
  let kickShake = null; // { born, duration, strength }

  // ── Color flash state ──
  let colorReturnTimer = null;

  // ── Subtle idle animation offsets ──
  let idleT = 0;

  // ── Animation loop ──
  let rafId;
  let alive = true;

  function animate() {
    if (!alive) return;
    rafId = requestAnimationFrame(animate);

    // ── Derive internal params from user controls ──
    // stiffness 0→1: 0 = jelly (soft spring, low damping = wobbly)
    //                1 = rigid (stiff spring, high damping = snappy)
    const poseStiff = 0.02 + CFG.stiffness * 0.38;   // 0.02 → 0.40
    const poseDamp  = 0.50 + CFG.stiffness * 0.45;   // 0.50 → 0.95
    // Jelly: gravity sag — when stiffness is low, head droops toward target slowly
    const gravSag   = (1 - CFG.stiffness) * 0.04;    // 0→0.04 extra Y droop

    const intens = CFG.intensity; // 0–1 drives pose range, idle sway, kick amp

    // ── Hue change — rebuild base mat + recolor meter bars ──
    if (CFG.hue !== lastHue) {
      lastHue = CFG.hue;
      baseMat = makeMat(BASE_HEX);
      meshes.forEach(m => { m.material = baseMat; });
      updateMeterColors();
    }

    // Poll audio stems
    stems.forEach(s => {
      const raw = getRMS(s.analyser) * (0.5 + intens * 1.5); // sensitivity driven by intensity
      s.lerpAmp += (raw - s.lerpAmp) * 0.15;
      if (s.meterEl) s.meterEl.style.height = Math.min(100, s.lerpAmp * 220) + '%';

      const now = performance.now();
      if (raw > EMIT_THRESHOLD && s.prev <= EMIT_THRESHOLD && now - s.lastFired > 200) {
        s.lastFired = now;
        if (s.type === 'kick') {
          // vibration: 0=barely moves, 1=full shake
          const baseStr = 0.06 + Math.random() * 0.14;
          const strength = baseStr * (0.1 + CFG.vibration * 0.9) * (0.5 + intens * 0.5);
          kickShake = { born: performance.now(), duration: 500, strength };
          meshes.forEach(m => { m.material = makeMat(0x80E080); });
          clearTimeout(colorReturnTimer);
          colorReturnTimer = setTimeout(() => {
            meshes.forEach(m => { m.material = baseMat; });
          }, 300);
        } else {
          let pose;
          if (s.type === 'synth') {
            pose = {
              rotX: (Math.random() - 0.5) * 1.4 * intens,
              rotY: (Math.random() - 0.5) * 2.6 * intens,
              rotZ: (Math.random() - 0.5) * 0.8 * intens,
            };
          } else {
            const base = STEM_POSES[s.type] || STEM_POSES.other;
            const jolt = 0.20;
            pose = {
              rotX: (base.rotX + (Math.random() - 0.5) * jolt) * intens,
              rotY: (base.rotY + (Math.random() - 0.5) * jolt) * intens,
              rotZ: (base.rotZ + (Math.random() - 0.5) * jolt) * intens,
            };
          }
          target = pose;
          const hex = STEM_COLORS_3D[s.type];
          if (hex != null && meshes.length > 0) {
            const mat = makeMat(hex);
            meshes.forEach(m => { m.material = mat; });
            clearTimeout(colorReturnTimer);
            colorReturnTimer = setTimeout(() => {
              meshes.forEach(m => { m.material = baseMat; });
            }, 600);
          }
        }
      }
      s.prev = raw;
    });

    // Spring physics toward target pose
    ['rotX', 'rotY', 'rotZ'].forEach(k => {
      vel[k] += (target[k] - current[k]) * poseStiff;
      vel[k] *= poseDamp;
      current[k] += vel[k];
    });

    // Gravity sag when stiffness is low — head droops down
    const sagY = gravSag * (1 + Math.sin(idleT * 0.4) * 0.3);

    // Idle micro-sway (scaled by intensity)
    idleT += 0.008;
    const swayScale = 0.4 + intens * 0.6;
    const idleX = Math.sin(idleT * 0.7)  * 0.012 * swayScale;
    const idleY = Math.sin(idleT * 1.1)  * 0.008 * swayScale + sagY;
    const idleZ = Math.sin(idleT * 0.55) * 0.006 * swayScale;

    // Kick shake — rotation oscillation only (no vertex deform, that's stiffness job)
    let shakeX = 0, shakeY = 0, shakeZ = 0;
    if (kickShake) {
      const t = (performance.now() - kickShake.born) / kickShake.duration;
      if (t >= 1.0) {
        kickShake = null;
      } else {
        const decay = 1 - t;
        const freq  = 28;
        const amp   = kickShake.strength * decay;
        shakeX = Math.sin(t * freq * 1.0) * amp * 0.4;
        shakeY = Math.sin(t * freq * 1.3) * amp * 0.3;
        shakeZ = Math.sin(t * freq * 0.8) * amp * 0.2;
      }
    }

    // ── Continuous noise-plane surface deformation (stiffness) ──
    // stiffness=1 → no deform (rigid)
    // stiffness=0 → heavy liquid/jelly surface noise, full gravity sag
    if (meshes.length > 0) {
      // Amplitude: 0 at stiff=1, grows nonlinearly toward stiff=0
      const softness  = 1 - CFG.stiffness;            // 0→1
      const noiseAmp  = softness * softness * 0.22 * (0.4 + intens * 0.6); // intensity boosts amplitude
      const gravAmp   = softness * 0.055 * (0.4 + intens * 0.6);
      // Speed: softer = slower, more like thick liquid
      const noiseSpd  = 0.4 + softness * 0.8;        // 0.4 → 1.2
      // Frequency: softer = lower frequency = big rolling waves; stiffer = tighter bumps
      const noiseFreq = 1.2 + CFG.stiffness * 2.8;   // 1.2 → 4.0
      const nt = idleT * noiseSpd;

      // Extra kick impulse on top when kick fires
      const kickBump = kickShake
        ? (1 - (performance.now() - kickShake.born) / kickShake.duration) * kickShake.strength * 3.0
        : 0;
      const totalAmp = noiseAmp + kickBump * softness;

      meshes.forEach(m => {
        if (!m.userData.origPositions) return;
        const orig = m.userData.origPositions;
        const pos  = m.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const ox = orig[i * 3];
          const oy = orig[i * 3 + 1];
          const oz = orig[i * 3 + 2];
          // Three offset noise samples per axis — smooth, coherent surface ripple
          const dx = smoothNoise(ox * noiseFreq,       oy * noiseFreq + 1.7, oz * noiseFreq + 3.1, nt);
          const dy = smoothNoise(ox * noiseFreq + 5.3, oy * noiseFreq,       oz * noiseFreq + 1.2, nt * 0.85);
          const dz = smoothNoise(ox * noiseFreq + 2.9, oy * noiseFreq + 4.1, oz * noiseFreq,       nt * 1.1);
          // Gravity: sag grows toward bottom of mesh (lower oy = more droop)
          const grav = gravAmp * Math.max(0, 0.5 - oy);
          pos.setXYZ(
            i,
            ox + dx * totalAmp,
            oy + dy * totalAmp - grav,
            oz + dz * totalAmp
          );
        }
        pos.needsUpdate = true;
        m.geometry.computeVertexNormals();
      });
    }

    head.rotation.x = current.rotX + idleX + shakeX;
    head.rotation.y = current.rotY + idleY + shakeY;
    head.rotation.z = current.rotZ + idleZ + shakeZ;

    renderer.render(scene, camera);
  }

  animate();

  // ── Click / tap push interaction ──
  function onPointerDown(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    // Normalised click position relative to canvas center (-1 → +1)
    const nx = ((e.clientX - rect.left)  / rect.width  - 0.5) * 2;
    const ny = ((e.clientY - rect.top)   / rect.height - 0.5) * 2;

    // Push direction: click on left → head tilts left (rotY negative), etc.
    // ny: click on top → head tilts back (rotX negative)
    const pushAmt = 0.30; // ~17 degrees — strong enough to see clearly
    const pushX =  ny * pushAmt;
    const pushY =  nx * pushAmt;
    const pushZ = -nx * ny * pushAmt * 0.5;

    // Displace from current position — spring pulls back to target
    current.rotX += pushX;
    current.rotY += pushY;
    current.rotZ += pushZ;
    // Give it velocity in the same direction so it overshoots slightly
    vel.rotX = pushX * 1.2;
    vel.rotY = pushY * 1.2;
    vel.rotZ = pushZ * 1.2;
  }
  renderer.domElement.addEventListener('pointerdown', onPointerDown);

  // ── Resize handler ──
  function onResize() {
    const W = wrap.clientWidth;
    const H = wrap.clientHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  }
  window.addEventListener('resize', onResize);

  // ── Dispose ──
  function dispose() {
    alive = false;
    cancelAnimationFrame(rafId);
    clearTimeout(colorReturnTimer);
    window.removeEventListener('resize', onResize);
    renderer.domElement.removeEventListener('pointerdown', onPointerDown);
    renderer.dispose();
    if (renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
  }

  function setFogColor(hex) {
    scene.fog.color.setHex(hex);
  }

  const BASE_Z = 4.2;
  function setZoom(zoomedOut) {
    // On mobile with HUD open, pull camera back so object stays visible
    const target = (zoomedOut && window.innerWidth <= 768) ? BASE_Z * 1.55 : BASE_Z;
    camera.position.z += (target - camera.position.z) * 0.12;
    // Keep nudging until settled
    if (Math.abs(camera.position.z - target) > 0.01) {
      requestAnimationFrame(() => setZoom(zoomedOut));
    } else {
      camera.position.z = target;
    }
  }

  return { dispose, setFogColor, setZoom };
}

boot();
</script>
</body>
</html>
